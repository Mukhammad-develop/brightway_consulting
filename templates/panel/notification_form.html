{% extends 'panel/base.html' %}

{% block page_title_header %}{{ page_title }}{% endblock %}

{% block topbar_actions %}
<a href="{% url 'panel:notifications' %}" class="btn btn-outline">← Back to Notifications</a>
{% endblock %}

{% block content %}
<div class="form-container">
    <form method="post" class="admin-form">
        {% csrf_token %}
        
        <div class="panel-card">
            <div class="card-header">Send Notification</div>
            <div class="card-body">
                <div class="form-group">
                    <label>Recipient</label>
                    <select name="recipient_id" class="form-select" id="recipientSelect">
                        <option value="">-- Select recipient --</option>
                        {% for admin in admins %}
                        <option value="{{ admin.pk }}">{{ admin.display_name|default:admin.username }} ({{ admin.role }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="send_to_all" id="sendToAll" onchange="toggleRecipient()">
                        <span>Send to all team members</span>
                    </label>
                </div>
                
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" class="form-input" required placeholder="Notification title">
                </div>
                
                <div class="form-group">
                    <label>Message *</label>
                    <textarea name="message" class="form-textarea" rows="4" required placeholder="Notification message..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Link (optional)</label>
                    <input type="text" name="link" class="form-input" placeholder="/admin/users/123">
                    <small>URL to link when notification is clicked</small>
                </div>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Send Notification</button>
            <a href="{% url 'panel:notifications' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

<style>
.form-container { max-width: 600px; }
</style>

<script>
function toggleRecipient() {
    const sendToAll = document.getElementById('sendToAll').checked;
    const recipientSelect = document.getElementById('recipientSelect');
    recipientSelect.disabled = sendToAll;
    if (sendToAll) {
        recipientSelect.value = '';
    }
}
</script>
{% endblock %}
